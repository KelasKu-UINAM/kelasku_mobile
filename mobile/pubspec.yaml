name: mobile
description: "KelasKu UINAM - aplikasi manajemen kelas mahasiswa UIN Alauddin Makassar."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  dio: ^5.8.0
  flutter_secure_storage: ^9.2.4

  go_router: ^14.8.1

  google_fonts: ^6.3.3
  intl: ^0.20.2

  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#F5F5F0"
  adaptive_icon_background: "#1E4D2B"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"

flutter_native_splash:
  color: "#F5F5F0"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#F5F5F0"
    image: assets/icon/splash_logo.png

flutter:
  uses-material-design: true
  assets:
    - .env
